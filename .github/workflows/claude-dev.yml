# Claude Code Auto-Development GitHub Action
# Triggers:
#   1. When "claude-dev" label is added to an issue → implements feature and creates PR
#   2. When someone comments with @claude on an issue or PR → responds/fixes
#   3. When a PR is opened or updated → auto-reviews the code
#   4. When a check/build fails on a PR → auto-diagnoses and fixes
#
# REQUIRED SECRETS:
#   ANTHROPIC_API_KEY - Your Anthropic API key (from https://console.anthropic.com/)
#
# REQUIRED GITHUB APP:
#   Install the Claude GitHub App: https://github.com/apps/claude

name: Claude Dev

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write
  checks: read

jobs:
  # ── Job 1: Implement features from labeled issues ──
  develop:
    if: github.event_name == 'issues' && github.event.label.name == 'claude-dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Implement feature
        id: claude-develop
        timeout-minutes: 20
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          label_trigger: "claude-dev"
          track_progress: true
          prompt: |
            Implement the feature described in this issue. Read CLAUDE.md first for project context and design standards.

            DESIGN QUALITY: Build production-quality UI, not wireframes. Use Tailwind CSS classes (never inline styles). Every page must have:
            - Visual depth: cards with shadows (shadow-md+), hover effects (hover:shadow-xl hover:-translate-y-1), transitions
            - Hero sections with gradient backgrounds and decorative blur elements, not plain solid colors
            - Typography hierarchy: large bold headings (text-4xl md:text-5xl font-extrabold), relaxed body text
            - Generous whitespace: section padding py-20 md:py-28, max-w-7xl mx-auto px-6
            - Alternating section backgrounds (white / bg-gray-50)
            - Polished buttons with shadows, rounded-full or rounded-xl, and hover states
            - Responsive design with md: and lg: breakpoints
            - Lucide React icons instead of emoji

            After implementing, commit and push your changes. The PR will be created automatically by a later workflow step — do NOT create a PR yourself.
          claude_args: |
            --max-turns 40
            --model claude-sonnet-4-20250514
            --allowedTools "Bash(git *),Bash(npm *),Bash(npx *),Bash(node *),Bash(cat *),Bash(ls *),Bash(find *),Edit,Read,Write,Glob,Grep"

      - name: Auto-create PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const issueNum = issue.number;
            // Find the branch Claude pushed — matches pattern claude/issue-N-*
            const branches = await github.rest.repos.listBranches({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const branch = branches.data
              .map(b => b.name)
              .find(name => name.startsWith(`claude/issue-${issueNum}-`));
            if (!branch) {
              console.log(`No claude branch found for issue #${issueNum}`);
              return;
            }
            console.log(`Found branch: ${branch}`);
            // Check if a PR already exists for this branch
            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            if (existing.data.length > 0) {
              console.log(`PR already exists: #${existing.data[0].number}`);
              return;
            }
            // Create the PR
            const prBody = `Implements the feature described in #${issueNum}.\n\nCloses #${issueNum}\n\nGenerated with [Claude Code](https://claude.ai/code)`;
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `feat: ${issue.title.toLowerCase()}`,
              body: prBody,
              head: branch,
              base: 'main'
            });
            console.log(`Created PR #${pr.data.number}: ${pr.data.html_url}`);

      - name: Report cost
        if: always() && steps.claude-develop.outputs.execution_file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const execFile = '${{ steps.claude-develop.outputs.execution_file }}';
            if (!fs.existsSync(execFile)) return;
            const log = JSON.parse(fs.readFileSync(execFile, 'utf8'));
            let inputTokens = 0, outputTokens = 0, cacheRead = 0, cacheCreation = 0;
            let model = 'unknown';
            for (const msg of log) {
              if (msg.usage) {
                inputTokens += msg.usage.input_tokens || 0;
                outputTokens += msg.usage.output_tokens || 0;
                cacheRead += msg.usage.cache_read_input_tokens || 0;
                cacheCreation += msg.usage.cache_creation_input_tokens || 0;
              }
              if (msg.model && model === 'unknown') model = msg.model;
            }
            // Dynamic pricing based on model
            const pricing = {
              'sonnet': { input: 3, output: 15, cacheRead: 0.30, cacheWrite: 3.75 },
              'opus':   { input: 15, output: 75, cacheRead: 1.50, cacheWrite: 18.75 },
              'haiku':  { input: 0.80, output: 4, cacheRead: 0.08, cacheWrite: 1 },
            };
            const tier = model.includes('opus') ? 'opus' : model.includes('haiku') ? 'haiku' : 'sonnet';
            const p = pricing[tier];
            const inputCost = (inputTokens / 1_000_000) * p.input;
            const outputCost = (outputTokens / 1_000_000) * p.output;
            const cacheReadCost = (cacheRead / 1_000_000) * p.cacheRead;
            const cacheCreationCost = (cacheCreation / 1_000_000) * p.cacheWrite;
            const totalCost = inputCost + outputCost + cacheReadCost + cacheCreationCost;
            const body = `**💰 Claude Run Cost Report** (develop)\n\n` +
              `| Metric | Value |\n|--------|-------|\n` +
              `| Model | \`${model}\` |\n` +
              `| Input tokens | ${inputTokens.toLocaleString()} |\n` +
              `| Output tokens | ${outputTokens.toLocaleString()} |\n` +
              `| Cache read | ${cacheRead.toLocaleString()} |\n` +
              `| Cache creation | ${cacheCreation.toLocaleString()} |\n` +
              `| **Estimated cost** | **$${totalCost.toFixed(4)}** |\n`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  # ── Job 2: Respond to @claude mentions in comments ──
  respond:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Respond to feedback
        id: claude-respond
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          claude_args: |
            --max-turns 40
            --model claude-sonnet-4-20250514
            --allowedTools "Bash(git *),Bash(npm *),Bash(npx *),Bash(node *),Bash(cat *),Bash(ls *),Bash(find *),Edit,Read,Write,Glob,Grep"

      - name: Report cost
        if: always() && steps.claude-respond.outputs.execution_file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const execFile = '${{ steps.claude-respond.outputs.execution_file }}';
            if (!fs.existsSync(execFile)) return;
            const log = JSON.parse(fs.readFileSync(execFile, 'utf8'));
            let inputTokens = 0, outputTokens = 0, cacheRead = 0, cacheCreation = 0;
            let model = 'unknown';
            for (const msg of log) {
              if (msg.usage) {
                inputTokens += msg.usage.input_tokens || 0;
                outputTokens += msg.usage.output_tokens || 0;
                cacheRead += msg.usage.cache_read_input_tokens || 0;
                cacheCreation += msg.usage.cache_creation_input_tokens || 0;
              }
              if (msg.model && model === 'unknown') model = msg.model;
            }
            const pricing = {
              'sonnet': { input: 3, output: 15, cacheRead: 0.30, cacheWrite: 3.75 },
              'opus':   { input: 15, output: 75, cacheRead: 1.50, cacheWrite: 18.75 },
              'haiku':  { input: 0.80, output: 4, cacheRead: 0.08, cacheWrite: 1 },
            };
            const tier = model.includes('opus') ? 'opus' : model.includes('haiku') ? 'haiku' : 'sonnet';
            const p = pricing[tier];
            const inputCost = (inputTokens / 1_000_000) * p.input;
            const outputCost = (outputTokens / 1_000_000) * p.output;
            const cacheReadCost = (cacheRead / 1_000_000) * p.cacheRead;
            const cacheCreationCost = (cacheCreation / 1_000_000) * p.cacheWrite;
            const totalCost = inputCost + outputCost + cacheReadCost + cacheCreationCost;
            const body = `**💰 Claude Run Cost Report** (respond)\n\n` +
              `| Metric | Value |\n|--------|-------|\n` +
              `| Model | \`${model}\` |\n` +
              `| Input tokens | ${inputTokens.toLocaleString()} |\n` +
              `| Output tokens | ${outputTokens.toLocaleString()} |\n` +
              `| Cache read | ${cacheRead.toLocaleString()} |\n` +
              `| Cache creation | ${cacheCreation.toLocaleString()} |\n` +
              `| **Estimated cost** | **$${totalCost.toFixed(4)}** |\n`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  # ── Job 3: Auto-review new PRs ──
  review:
    if: |
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize') &&
      !contains(github.event.pull_request.title, '[skip review]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch main for diff
        run: git fetch origin main

      - name: Review PR
        id: claude-review
        timeout-minutes: 10
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "claude[bot]"
          prompt: |
            You are reviewing a pull request. The repo is checked out on the PR's head branch.

            To see what changed, run: git diff origin/main...HEAD
            To see which files changed, run: git diff --name-only origin/main...HEAD
            To read the full content of changed files, use the Read tool.

            Review the changes for:
            1. Correctness — does the code do what it claims?
            2. Security — any injection risks, exposed secrets, or unsafe patterns?
            3. Performance — any obvious N+1 queries, memory leaks, or unnecessary re-renders?
            4. Style — does it follow the patterns in CLAUDE.md?

            Be concise. If everything looks good, say so briefly — don't invent problems.
            Write your review as a summary with any specific issues called out.
          claude_args: |
            --max-turns 10
            --model claude-sonnet-4-20250514
            --allowedTools "Bash(git diff *),Bash(git log *),Bash(git fetch *),Read,Glob,Grep"

      - name: Post review comment
        if: success() && steps.claude-review.outputs.execution_file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const execFile = '${{ steps.claude-review.outputs.execution_file }}';
            if (!fs.existsSync(execFile)) return;
            const log = JSON.parse(fs.readFileSync(execFile, 'utf8'));
            // Find Claude's final assistant response (the review)
            let reviewText = '';
            for (const msg of log) {
              if (msg.type === 'assistant' && msg.message && msg.message.content) {
                // Get the last assistant message with text content
                const textBlocks = msg.message.content.filter(b => b.type === 'text');
                if (textBlocks.length > 0) {
                  reviewText = textBlocks.map(b => b.text).join('\n');
                }
              }
            }
            if (!reviewText) {
              console.log('No review text found in execution log');
              return;
            }
            const body = `## Code Review\n\n${reviewText}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
            console.log('Posted review comment');

      - name: Report cost
        if: always() && steps.claude-review.outputs.execution_file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const execFile = '${{ steps.claude-review.outputs.execution_file }}';
            if (!fs.existsSync(execFile)) return;
            const log = JSON.parse(fs.readFileSync(execFile, 'utf8'));
            let inputTokens = 0, outputTokens = 0, cacheRead = 0, cacheCreation = 0;
            let model = 'unknown';
            for (const msg of log) {
              if (msg.usage) {
                inputTokens += msg.usage.input_tokens || 0;
                outputTokens += msg.usage.output_tokens || 0;
                cacheRead += msg.usage.cache_read_input_tokens || 0;
                cacheCreation += msg.usage.cache_creation_input_tokens || 0;
              }
              if (msg.model && model === 'unknown') model = msg.model;
            }
            const pricing = {
              'sonnet': { input: 3, output: 15, cacheRead: 0.30, cacheWrite: 3.75 },
              'opus':   { input: 15, output: 75, cacheRead: 1.50, cacheWrite: 18.75 },
              'haiku':  { input: 0.80, output: 4, cacheRead: 0.08, cacheWrite: 1 },
            };
            const tier = model.includes('opus') ? 'opus' : model.includes('haiku') ? 'haiku' : 'sonnet';
            const p = pricing[tier];
            const inputCost = (inputTokens / 1_000_000) * p.input;
            const outputCost = (outputTokens / 1_000_000) * p.output;
            const cacheReadCost = (cacheRead / 1_000_000) * p.cacheRead;
            const cacheCreationCost = (cacheCreation / 1_000_000) * p.cacheWrite;
            const totalCost = inputCost + outputCost + cacheReadCost + cacheCreationCost;
            const body = `**💰 Claude Run Cost Report** (review)\n\n` +
              `| Metric | Value |\n|--------|-------|\n` +
              `| Model | \`${model}\` |\n` +
              `| Input tokens | ${inputTokens.toLocaleString()} |\n` +
              `| Output tokens | ${outputTokens.toLocaleString()} |\n` +
              `| Cache read | ${cacheRead.toLocaleString()} |\n` +
              `| Cache creation | ${cacheCreation.toLocaleString()} |\n` +
              `| **Estimated cost** | **$${totalCost.toFixed(4)}** |\n`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

  # ── Job 4: Auto-fix CI failures ──
  fix-ci:
    if: |
      github.event_name == 'check_suite' &&
      github.event.check_suite.conclusion == 'failure' &&
      github.event.check_suite.head_branch != 'main' &&
      contains(github.event.check_suite.head_branch, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
      checks: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.check_suite.head_branch }}
          fetch-depth: 1

      - name: Fix CI failure
        id: claude-fix-ci
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            The CI checks failed on this branch. Please:
            1. Read the failing check logs to understand what went wrong
            2. Fix the issue in the code
            3. Commit and push the fix

            Common failures: build errors, lint issues, type errors, test failures.
            Fix the root cause, don't just suppress warnings.
          claude_args: |
            --max-turns 15
            --model claude-sonnet-4-20250514

      - name: Report cost
        if: always() && steps.claude-fix-ci.outputs.execution_file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const execFile = '${{ steps.claude-fix-ci.outputs.execution_file }}';
            if (!fs.existsSync(execFile)) return;
            const log = JSON.parse(fs.readFileSync(execFile, 'utf8'));
            let inputTokens = 0, outputTokens = 0, cacheRead = 0, cacheCreation = 0;
            let model = 'unknown';
            for (const msg of log) {
              if (msg.usage) {
                inputTokens += msg.usage.input_tokens || 0;
                outputTokens += msg.usage.output_tokens || 0;
                cacheRead += msg.usage.cache_read_input_tokens || 0;
                cacheCreation += msg.usage.cache_creation_input_tokens || 0;
              }
              if (msg.model && model === 'unknown') model = msg.model;
            }
            const pricing = {
              'sonnet': { input: 3, output: 15, cacheRead: 0.30, cacheWrite: 3.75 },
              'opus':   { input: 15, output: 75, cacheRead: 1.50, cacheWrite: 18.75 },
              'haiku':  { input: 0.80, output: 4, cacheRead: 0.08, cacheWrite: 1 },
            };
            const tier = model.includes('opus') ? 'opus' : model.includes('haiku') ? 'haiku' : 'sonnet';
            const p = pricing[tier];
            const inputCost = (inputTokens / 1_000_000) * p.input;
            const outputCost = (outputTokens / 1_000_000) * p.output;
            const cacheReadCost = (cacheRead / 1_000_000) * p.cacheRead;
            const cacheCreationCost = (cacheCreation / 1_000_000) * p.cacheWrite;
            const totalCost = inputCost + outputCost + cacheReadCost + cacheCreationCost;
            const body = `**💰 Claude Run Cost Report** (fix-ci)\n\n` +
              `| Metric | Value |\n|--------|-------|\n` +
              `| Model | \`${model}\` |\n` +
              `| Input tokens | ${inputTokens.toLocaleString()} |\n` +
              `| Output tokens | ${outputTokens.toLocaleString()} |\n` +
              `| Cache read | ${cacheRead.toLocaleString()} |\n` +
              `| Cache creation | ${cacheCreation.toLocaleString()} |\n` +
              `| **Estimated cost** | **$${totalCost.toFixed(4)}** |\n`;
            // Find the PR associated with this branch
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${{ github.event.check_suite.head_branch }}`,
              state: 'open'
            });
            if (pulls.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pulls.data[0].number,
                body
              });
            }
