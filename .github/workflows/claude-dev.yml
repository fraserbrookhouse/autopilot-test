# Claude Code Auto-Development GitHub Action
# Triggers:
#   1. When "claude-dev" label is added to an issue → implements feature and creates PR
#   2. When someone comments with @claude on an issue or PR → responds/fixes
#
# REQUIRED SECRETS:
#   ANTHROPIC_API_KEY - Your Anthropic API key (from https://console.anthropic.com/)
#
# REQUIRED GITHUB APP:
#   Install the Claude GitHub App: https://github.com/apps/claude

name: Claude Dev

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  develop:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'claude-dev') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          label_trigger: "claude-dev"
